<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Careers - Home Tuition Hyderabad</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; margin:0; background:#f9fafb; }
    .container { max-width:800px; margin:auto; padding:40px 20px; }
    h1 { text-align:center; }
    .box { background:#fff; padding:25px; border-radius:10px; box-shadow:0 4px 20px rgba(0,0,0,0.08); }
    input, select { width:100%; padding:12px; margin:10px 0; border-radius:6px; border:1px solid #ddd; }
    button { width:100%; padding:14px; background:#1B4FD8; color:#fff; border:none; border-radius:6px; font-size:16px; cursor:pointer; }
    button:hover { background:#1340B0; }
  </style>
</head>
<body>

<div class="container">
  <h1>Join as a Home Tutor</h1>
  <p style="text-align:center;">We are looking for passionate tutors across Hyderabad. Fill the form below and our team will contact you.</p>

  <div class="box">
    <form action="https://formsubmit.co/youremail@gmail.com" method="POST">

      <input type="text" name="name" placeholder="Full Name" required>
      <input type="tel" name="phone" placeholder="Phone Number" required>
      <input type="email" name="email" placeholder="Email Address" required>

      <select name="subject" required>
        <option value="">Select Subject</option>
        <option>Maths</option>
        <option>Science</option>
        <option>English</option>
        <option>Physics</option>
        <option>Chemistry</option>
      </select>

      <input type="text" name="area" placeholder="Your Area in Hyderabad" required>

      <button type="submit">Apply Now</button>

    </form>
  </div>
</div>

</body>
</html>

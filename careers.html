<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Become a Tutor | Aamer Home Tuitions</title>

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f5f9ff;
}

.tutor-section{
  padding:80px 20px;
}

.tutor-container{
  max-width:1200px;
  margin:auto;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:50px;
  align-items:center;
}

.badge{
  background:#e6f0ff;
  color:#0056d6;
  padding:10px 18px;
  border-radius:30px;
  font-size:14px;
  font-weight:600;
  display:inline-block;
}

.tutor-left h2{
  font-size:52px;
  margin:20px 0;
  color:#0f172a;
  line-height:1.2;
}

.tutor-left p{
  color:#64748b;
  line-height:1.8;
  font-size:18px;
}

.benefits{
  margin-top:30px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.benefits div{
  background:white;
  padding:18px;
  border-radius:14px;
  box-shadow:0 4px 15px rgba(0,0,0,0.05);
  font-weight:600;
}

.tutor-form-card{
  background:white;
  padding:40px;
  border-radius:24px;
  box-shadow:0 10px 40px rgba(0,0,0,0.08);
}

.tutor-form-card form{
  display:flex;
  flex-direction:column;
  gap:20px;
}

.tutor-form-card input{
  width:100%;
  padding:16px;
  border:1px solid #dbeafe;
  border-radius:12px;
  font-size:16px;
  box-sizing:border-box;
}

.tutor-form-card button{
  background:#0056d6;
  color:white;
  border:none;
  padding:18px;
  border-radius:12px;
  font-size:18px;
  font-weight:600;
  cursor:pointer;
}

.tutor-form-card button:hover{
  background:#003ea8;
}

@media(max-width:768px){

  .tutor-container{
    grid-template-columns:1fr;
  }

  .tutor-left h2{
    font-size:36px;
  }

}

</style>

</head>

<body>

<section class="tutor-section">

  <div class="tutor-container">

    <div class="tutor-left">

      <span class="badge">
        Join Our Tutor Network
      </span>

      <h2>
        Become a Tutor in Hyderabad
      </h2>

      <p>
        Teach students near your area, earn flexible income,
        and grow with Hyderabad’s trusted home tuition platform.
      </p>

      <div class="benefits">
        <div>✔ Flexible Timings</div>
        <div>✔ Daily Tuition Leads</div>
        <div>✔ Verified Parents</div>
        <div>✔ Work Near Your Area</div>
      </div>

    </div>

    <div class="tutor-form-card">

      <form>

        <input type="text" placeholder="Full Name">

        <input type="tel" placeholder="Phone Number">

        <input type="email" placeholder="Email Address">

        <input type="text" placeholder="Subject Expertise">

        <input type="text" placeholder="Your Area in Hyderabad">

        <button type="submit">
          Apply Now
        </button>

      </form>

    </div>

  </div>

</section>

</body>
</html>
